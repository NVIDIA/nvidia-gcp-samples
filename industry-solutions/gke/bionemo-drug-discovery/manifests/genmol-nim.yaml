apiVersion: apps/v1
kind: Deployment
metadata:
  name: genmol-nim
  namespace: bionemo-nim
  labels:
    app: genmol-nim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: genmol-nim
  template:
    metadata:
      labels:
        app: genmol-nim
    spec:
      imagePullSecrets:
      - name: ngc-secret
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-rtx-pro-6000-vws
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      containers:
      - name: genmol
        image: nvcr.io/nim/nvidia/genmol:1.0.1
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: NGC_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: ngc-api-key
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: gemini-api-key
        resources:
          limits:
            nvidia.com/gpu: "1"
          requests:
            nvidia.com/gpu: "1"
            memory: 16Gi
            cpu: "4"
        readinessProbe:
          httpGet:
            path: /v1/health/ready
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 15
        livenessProbe:
          httpGet:
            path: /v1/health/live
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: genmol-nim
  namespace: bionemo-nim
  labels:
    app: genmol-nim
spec:
  type: ClusterIP
  selector:
    app: genmol-nim
  ports:
  - name: http
    protocol: TCP
    port: 8000
    targetPort: 8000
